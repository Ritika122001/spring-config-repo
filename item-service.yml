spring:
  application:
    name: item-service

server:
  port: 8089
  
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true


logging:
  level:
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: refresh,health,info
